name: MLOps Pipeline

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [drift_detected]
  workflow_dispatch:
    inputs:
      mode:
        description: "Simulation mode"
        required: true
        default: "drift"
        type: choice
        options: [drift, attack, schema]

# PYTHONPATH propagated to all jobs
env:
  PYTHONPATH: src

jobs:
  # ─── Job 1: CI ─────────────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Lenient: flags the issue as an annotation but does not block merging
      - name: Check notebook outputs
        continue-on-error: true
        run: |
          uv run nbstripout --check notebooks/*.ipynb \
            && echo "✅ All notebooks clean" \
            || echo "⚠️  Notebooks contain outputs — run 'just format' locally"

      # Lenient: warns but does not fail the job or block downstream
      - name: Lint — ruff
        continue-on-error: true
        run: uv run ruff check .

      # Strict: a failing test DOES block train + build jobs
      - name: Run tests
        run: uv run pytest tests/ -v --cov=src --cov-report=term-missing

  # ─── Job 2: Train & Export ─────────────────────────────────────────────────
  # Runs on: push to main (or tag), repository_dispatch (CT from drift)
  # Skipped on: pull_request, workflow_dispatch
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: ci
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || github.event_name == 'repository_dispatch'
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/rossmann-ops.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure DVC credentials
        run: |
          uv run dvc remote modify dagshub --local auth basic
          uv run dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          uv run dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_PAT }}

      - name: Pull data from DagsHub
        run: uv run dvc pull -r dagshub

      - name: Train production model
        run: uv run python -m rossmann_ops.train_model

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-model
          path: models/
          retention-days: 7

      - name: Upload store data (needed by Dockerfile.api build context)
        uses: actions/upload-artifact@v4
        with:
          name: store-data
          path: data/raw/store.csv
          retention-days: 7

  # ─── Job 3: Simulate (manual trigger via GitHub UI only) ───────────────────
  simulate:
    name: "Simulate — ${{ inputs.mode }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/rossmann-ops.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure DVC + pull data
        run: |
          uv run dvc remote modify dagshub --local auth basic
          uv run dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          uv run dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_PAT }}
          uv run dvc pull -r dagshub

      # attack mode correctly exits 1 (detects poisoning) — mark continue-on-error
      # so the job passes and logs are visible, not swallowed in a red job failure
      - name: "Run simulation (${{ inputs.mode }})"
        continue-on-error: ${{ inputs.mode == 'attack' }}
        run: uv run python scripts/simulate_production.py --mode ${{ inputs.mode }}

  # ─── Job 4: Build & Push Docker ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: production-model
          path: models/

      - name: Download store data
        uses: actions/download-artifact@v4
        with:
          name: store-data
          path: data/raw/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag with git ref name if it's a version tag, otherwise just latest
      - name: Resolve image tags
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VER="${GITHUB_REF_NAME}"
            echo "tags_api=${{ secrets.DOCKERHUB_USERNAME }}/rossmann-api:${VER},${{ secrets.DOCKERHUB_USERNAME }}/rossmann-api:latest" >> $GITHUB_OUTPUT
            echo "tags_ui=${{ secrets.DOCKERHUB_USERNAME }}/rossmann-ui:${VER},${{ secrets.DOCKERHUB_USERNAME }}/rossmann-ui:latest" >> $GITHUB_OUTPUT
          else
            echo "tags_api=${{ secrets.DOCKERHUB_USERNAME }}/rossmann-api:latest" >> $GITHUB_OUTPUT
            echo "tags_ui=${{ secrets.DOCKERHUB_USERNAME }}/rossmann-ui:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags_api }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ steps.meta.outputs.tags_ui }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 5: GitHub Release (version tag pushes only) ───────────────────────
  # Creates a release with k8s manifests attached — graders/deployers can grab
  # the exact manifests that correspond to each versioned Docker image
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-model
          path: models/

      - name: Rewrite manifests for DockerHub
        run: |
          sed -i "s|image: rossmann-api:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/rossmann-api:${{ github.ref_name }}|g" k8s/api.yaml
          sed -i "s|image: rossmann-ui:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/rossmann-ui:${{ github.ref_name }}|g" k8s/ui.yaml

      - name: Create Deployment Bundle (ZIP)
        run: |
          zip -r deployment-bundle-${{ github.ref_name }}.zip \
            src/ \
            scripts/ \
            k8s/ \
            configs/ \
            Justfile \
            pyproject.toml \
            uv.lock \
            models/store_target_means.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deployment-bundle-${{ github.ref_name }}.zip
            k8s/api.yaml
            k8s/ui.yaml
          body: |
            # Release Specification: ${{ github.ref_name }}
            
            This release provides the finalized configuration and artifacts for the evaluation of the Rossmann Store Sales demand forecasting system.
            
            ## Asset Overview
            
            ### Optimized Kubernetes Manifests
            - **api.yaml & ui.yaml**: Version-controlled manifests pre-configured to resolve container images directly from DockerHub. These files allow for immediate deployment to a Kubernetes cluster without requiring a local build environment or source code access.
            
            ### Deployment Bundle
            - **deployment-bundle-${{ github.ref_name }}.zip**: A comprehensive archive containing the project source code, infrastructure automation logic, and pre-trained statistical artifacts. Required for local simulation, retraining, or a full system audit.
            
            ## Deployment Instructions
            
            ### Option 1: Direct Container Deployment
            This method utilizes the pre-built images hosted on DockerHub.
            
            1. Initialize the local cluster infrastructure:
               ```bash
               kind create cluster --name rossmann-cluster
               ```
            2. Apply the versioned manifests:
               ```bash
               kubectl apply -f api.yaml
               kubectl apply -f ui.yaml
               ```
            
            ### Option 2: Full System Replication
            This method initializes the complete MLOps environment.
            
            1. Extract the deployment bundle ZIP.
            2. Ensure a Python 3.12 environment and the `uv` package manager are installed.
            3. Execute the setup sequence:
               ```bash
               just setup
               ```
            4. Verify cluster status or run local simulations as documented in the source `README.md`.
