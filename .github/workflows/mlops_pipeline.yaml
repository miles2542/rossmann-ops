name: MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [drift_detected]

# PYTHONPATH needed by all jobs that touch rossmann_ops package
env:
  PYTHONPATH: src

jobs:
  # ─── Job 1: Lint & Test ────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  # ─── Job 2: Train & Export ─────────────────────────────────────────────────
  # Runs on: push to main, or repository_dispatch (drift_detected CT trigger)
  # Skipped on: pull_request
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/rossmann-ops.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure DVC credentials
        # Credentials go to .dvc/config.local (gitignored), not committed config
        run: |
          uv run dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          uv run dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_PAT }}

      - name: Pull data from DagsHub
        run: uv run dvc pull -r dagshub

      - name: Train production model
        # Logs metrics, params, and model artifact to DagsHub MLflow
        run: uv run python -m rossmann_ops.train_model

      - name: Export model artifact to models/
        # Downloads the just-logged run from DagsHub and materialises it locally
        run: uv run python scripts/export_model.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-model
          path: models/
          retention-days: 7

      - name: Upload store data (needed by Dockerfile.api)
        uses: actions/upload-artifact@v4
        with:
          name: store-data
          path: data/raw/store.csv
          retention-days: 7

  # ─── Job 3: Build & Push Docker ────────────────────────────────────────────
  # Needs train to have a fresh model in the artifact cache
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: production-model
          path: models/

      - name: Download store data
        uses: actions/download-artifact@v4
        with:
          name: store-data
          path: data/raw/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rossmann-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rossmann-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
