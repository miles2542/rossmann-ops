data:
  raw_train: "data/raw/train.csv"
  raw_store: "data/raw/store.csv"
  processed_dir: "data/processed"

data_split:
  simulation_days: 42
  holdout_days: 28

features:
  target: "Sales"
  # OHE column contract: all categories that must be present at training and inference.
  # Used to align single-row inference payloads to the training feature space.
  ohe_expected_columns:
    - "StoreType_a"
    - "StoreType_b"
    - "StoreType_c"
    - "StoreType_d"
    - "Assortment_a"
    - "Assortment_b"
    - "Assortment_c"
    - "StateHoliday_0"
    - "StateHoliday_a"
    - "StateHoliday_b"
    - "StateHoliday_c"

train:
  random_state: 105
  experiment_name: "Rossmann_Forecasting"
  n_splits: 3

model:
  type: "RandomForest"
  save_path: "models/production_model"
  target_means_path: "models/store_target_means.json"
  production:
    n_estimators: 50
    max_depth: 10
    min_samples_split: 6

pipeline:
  github:
    owner: "miles2542"
    repo: "rossmann-ops"
  simulation:
    api_url: "http://localhost:8000"
    z_score_threshold: 3.0
    p_value_threshold: 0.05
    drift_feature: "CompetitionDistance"
    drift_shift: 50000.0
