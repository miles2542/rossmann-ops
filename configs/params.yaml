data:
  raw_train: "data/raw/train.csv"
  raw_store: "data/raw/store.csv"
  processed_dir: "data/processed"

features:
  target: "Sales"
  baseline:
    - "Store"
    - "DayOfWeek"
    - "Promo"
    - "Open"
  categorical:
    - "DayOfWeek"
  numerical:
    - "Store"
    - "Promo"
    - "Open"

data_split:
  simulation_days: 42
  holdout_days: 28

train:
  test_size: 0.2
  random_state: 105
  experiment_name: "Rossmann_Forecasting"
  n_splits: 3

model:
  type: "Ridge"
  alpha: 1.0
  save_path: "models/baseline_ridge.pkl"
  validation_threshold: 0.05
  production:
    type: "XGBoost"
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 7

pipeline:
  github:
    owner: "miles2542"
    repo: "rossmann-ops"
  simulation:
    api_url: "http://localhost:8000"
    z_score_threshold: 3.0
    p_value_threshold: 0.05
    drift_feature: "CompetitionDistance"
    drift_shift: 50000.0
