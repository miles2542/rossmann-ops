apiVersion: apps/v1
kind: Deployment
metadata:
  name: rossmann-api
  labels:
    app: rossmann-api
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rossmann-api
  template:
    metadata:
      labels:
        app: rossmann-api
        tier: backend
    spec:
      containers:
        - name: rossmann-api
          image: rossmann-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app: rossmann-api
spec:
  type: NodePort
  selector:
    app: rossmann-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30100
      name: http
