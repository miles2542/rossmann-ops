apiVersion: apps/v1
kind: Deployment
metadata:
  name: rossmann-ui
  labels:
    app: rossmann-ui
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rossmann-ui
  template:
    metadata:
      labels:
        app: rossmann-ui
        tier: frontend
    spec:
      containers:
        - name: rossmann-ui
          image: rossmann-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: API_URL
              value: "http://api-service:8000"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  labels:
    app: rossmann-ui
spec:
  type: NodePort
  selector:
    app: rossmann-ui
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
      nodePort: 30000
